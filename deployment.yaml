apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-similarity

spec:
  replicas: 4

  selector:
    matchLabels:
      app: product-similarity

  template:
    metadata:
      labels:
        app: product-similarity

    spec:
      containers:
      - name: product-similarity

        image: product-similarity:latest

        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service

metadata:
  name: product-similarity-service

spec:
  selector:
    app: product-similarity

  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000

  type: LoadBalancer